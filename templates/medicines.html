<!DOCTYPE html>
<html>
<head>
    <title>Medicines</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .Expired {
            color: red;
            font-weight: bold;
        }
        .Out {
            color: orange;
            font-weight: bold;
        }
        .Available {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Medicine List</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Quantity</th>
        <th>Price (₹)</th>
        <th>Expiry Date</th>
        <th>Status</th>
    </tr>

    {% for m in medicines %}
    <tr>
        <td>{{ m.name }}</td>
        <td>{{ m.quantity }}</td>
        <td>{{ m.price }}</td>
        <td>{{ m.expiry }}</td>
        <td class="{{ m.status }}">{{ m.status }}</td>
    </tr>
    {% endfor %}
</table>

<br><br>

<a href="/dashboard">⬅ Back to Dashboard</a> |
<a href="/logout">Logout</a>

</body>
</html>
